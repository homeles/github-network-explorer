version: '3.8'
services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
      - NODE_ENV=production
    env_file:
      - .env
